<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My AI Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .markdown-body p { margin-bottom: 0.75rem; }
    .markdown-body p:last-child { margin-bottom: 0; }
    .markdown-body code { background-color: #3f3f46; padding: 0.15rem 0.3rem; border-radius: 0.25rem; font-size: 0.875em; font-family: monospace; }
    .markdown-body pre code { background-color: transparent; padding: 0; font-size: 0.9em; color: #e5e7eb; }
    .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.75rem; }
    .markdown-body ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 0.75rem; }
  </style>
</head>
<body class="bg-[#212121] text-gray-100 font-sans h-screen flex flex-col relative">

  <div id="login-overlay" class="absolute inset-0 bg-[#212121] z-50 flex flex-col items-center justify-center">
    <h2 class="text-2xl font-bold mb-6">Login to AI Assistant</h2>
    <input type="password" id="password-input" placeholder="Enter Password" autocomplete="new-password" class="bg-[#2f2f2f] text-white px-4 py-2 rounded-md mb-4 border border-gray-600 outline-none">
    <button id="login-btn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-6 rounded-md transition-colors">Login</button>
  </div>

  <div id="app-container" class="hidden flex flex-col h-full">
    <header class="flex items-center justify-between p-4 border-b border-gray-700 bg-[#212121] z-10 shrink-0">
      <h1 class="text-xl font-semibold">My AI Assistant</h1>
      <div class="flex gap-2">
        <button id="clear-chat-btn" class="text-xs text-red-400 hover:text-red-300 mr-2">Clear History</button>
        <button id="logout-btn" class="text-xs text-gray-400 hover:text-white mr-2">Logout</button>
        <select id="model-select" class="bg-[#2f2f2f] text-sm text-gray-300 border border-gray-600 rounded-md px-3 py-1.5 outline-none cursor-pointer hover:bg-[#3a3a3a] transition-colors"></select>
      </div>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 w-full max-w-3xl mx-auto pb-32">
      <div id="welcome-msg" class="flex items-center justify-center h-full text-gray-500">
        <p>How can I help you today?</p>
      </div>
    </main>

    <div class="fixed bottom-0 w-full bg-gradient-to-t from-[#212121] via-[#212121] to-transparent pt-6 pb-6">
      <form id="chat-form" class="max-w-3xl mx-auto flex items-center bg-[#2f2f2f] rounded-full px-4 py-2 shadow-lg border border-gray-600">
        <input id="chat-input" class="flex-1 bg-transparent border-none outline-none text-white px-2 py-2 placeholder-gray-400" placeholder="Message AI..." autocomplete="off" />
        <button id="submit-btn" type="submit" class="ml-2 bg-white text-black rounded-full p-2 w-10 h-10 flex items-center justify-center font-bold hover:bg-gray-200 transition-colors disabled:opacity-50">↑</button>
      </form>
    </div>
  </div>

  <script>
    const loginOverlay = document.getElementById('login-overlay');
    const appContainer = document.getElementById('app-container');
    const passwordInput = document.getElementById('password-input');
    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    
    const chatBox = document.getElementById('chat-box');
    const form = document.getElementById('chat-form');
    const input = document.getElementById('chat-input');
    const welcomeMsg = document.getElementById('welcome-msg');
    const submitBtn = document.getElementById('submit-btn');
    const modelSelect = document.getElementById('model-select');
    const clearChatBtn = document.getElementById('clear-chat-btn');

    let messages = [];

    // --- 1-DAY LOGIN LOGIC ---
    function savePasswordForOneDay(pwd) {
      const oneDayInMs = 24 * 60 * 60 * 1000;
      const data = { password: pwd, expiry: new Date().getTime() + oneDayInMs };
      localStorage.setItem('app_auth_data', JSON.stringify(data));
    }

    function getSavedPassword() {
      const dataStr = localStorage.getItem('app_auth_data');
      if (!dataStr) return '';
      try {
        const data = JSON.parse(dataStr);
        if (new Date().getTime() > data.expiry) {
          localStorage.removeItem('app_auth_data'); // Expired!
          return '';
        }
        return data.password;
      } catch(e) { return ''; }
    }

    function clearPassword() {
      localStorage.removeItem('app_auth_data');
    }

    let savedPassword = getSavedPassword();

    // --- APP LOGIC ---
    async function loadConfig() {
      try {
        const response = await fetch('/config.json');
        const config = await response.json();
        config.models.forEach(model => {
          const option = document.createElement('option');
          option.value = model.value;
          option.textContent = model.name;
          modelSelect.appendChild(option);
        });
      } catch (error) { console.error("Failed to load config.json"); }
    }
    loadConfig();

    async function saveChatHistory() {
      const historyToSave = messages.slice(-50);
      await fetch('/api/db', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': savedPassword },
        body: JSON.stringify({ history: JSON.stringify(historyToSave) })
      });
    }

    async function loadChatHistory() {
      try {
        const response = await fetch('/api/db', { headers: { 'Authorization': savedPassword } });
        if (response.status === 401) {
          alert("Incorrect Password or Session Expired!");
          clearPassword();
          loginOverlay.classList.remove('hidden');
          appContainer.classList.add('hidden');
          return;
        }
        const data = await response.json();
        if (data.history && data.history.length > 0) {
          messages = data.history;
          if (welcomeMsg) welcomeMsg.remove();
          messages.forEach(msg => appendMessageUI(msg.role, msg.content));
        }
      } catch (error) { console.error("Failed to load history.", error); }
    }

    if (savedPassword) {
      loginOverlay.classList.add('hidden');
      appContainer.classList.remove('hidden');
      loadChatHistory();
    }

    loginBtn.addEventListener('click', () => {
      const pwd = passwordInput.value.trim();
      if(pwd) {
        savedPassword = pwd;
        savePasswordForOneDay(pwd);
        loginOverlay.classList.add('hidden');
        appContainer.classList.remove('hidden');
        loadChatHistory();
      }
    });

    logoutBtn.addEventListener('click', () => {
      clearPassword();
      window.location.reload();
    });

    clearChatBtn.addEventListener('click', async () => {
      if(confirm('Erase your cloud chat history?')) {
        messages = [];
        chatBox.innerHTML = '<div id="welcome-msg" class="flex items-center justify-center h-full text-gray-500"><p>History cleared. How can I help you today?</p></div>';
        await saveChatHistory();
      }
    });

    function appendMessageUI(role, text) {
      if (welcomeMsg) welcomeMsg.remove(); 
      const msgDiv = document.createElement('div');
      msgDiv.className = 'mb-6 flex w-full';
      
      const labelDiv = document.createElement('div');
      labelDiv.className = `font-bold mr-4 shrink-0 ${role === 'user' ? 'text-blue-400' : 'text-green-400'}`;
      labelDiv.textContent = role === 'user' ? 'You:' : 'AI:';
      
      const contentDiv = document.createElement('div');
      contentDiv.className = 'flex-1 overflow-x-hidden leading-relaxed markdown-body';
      
      if (role === 'user') {
        contentDiv.textContent = text;
      } else {
        contentDiv.innerHTML = marked.parse(text);
        const preTags = contentDiv.querySelectorAll('pre');
        preTags.forEach(pre => {
          pre.className = 'bg-black text-gray-300 p-4 rounded-md my-4 relative overflow-x-auto group border border-gray-700';
          const copyBtn = document.createElement('button');
          copyBtn.className = 'absolute top-2 right-2 bg-gray-700 hover:bg-gray-600 text-xs text-white px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity';
          copyBtn.textContent = 'Copy';
          copyBtn.addEventListener('click', () => {
            const codeText = pre.querySelector('code')?.innerText || pre.innerText;
            navigator.clipboard.writeText(codeText).then(() => {
              copyBtn.textContent = 'Copied!';
              setTimeout(() => { copyBtn.textContent = 'Copy'; }, 2000);
            });
          });
          pre.appendChild(copyBtn);
        });
      }

      msgDiv.appendChild(labelDiv);
      msgDiv.appendChild(contentDiv);
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const userText = input.value.trim();
      if (!userText) return;

      messages.push({ role: "user", content: userText });
      appendMessageUI('user', userText);
      saveChatHistory();
      input.value = '';
      input.disabled = true;
      submitBtn.disabled = true;

      const loadingDiv = document.createElement('div');
      loadingDiv.className = "text-gray-500 italic flex animate-pulse mb-6";
      loadingDiv.innerHTML = '<span class="font-bold mr-4 text-green-400">AI:</span> Thinking...';
      chatBox.appendChild(loadingDiv);
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: messages, model: modelSelect.value, password: savedPassword })
        });
        
        const data = await response.json();
        loadingDiv.remove();

        if (response.status === 401) {
            alert('Wrong password!');
            clearPassword();
            window.location.reload();
            return;
        }

        if (data.reply) {
          messages.push({ role: "assistant", content: data.reply });
          appendMessageUI('assistant', data.reply);
          saveChatHistory();
        } else {
          appendMessageUI('assistant', "Error: " + (data.error || "Failed to load."));
        }
      } catch (error) {
        loadingDiv.remove();
        appendMessageUI('assistant', "Server connection error.");
      }

      input.disabled = false;
      submitBtn.disabled = false;
      input.focus();
    });
  </script>
</body>
</html>
