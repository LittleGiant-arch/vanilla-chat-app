<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My AI Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .markdown-body p { margin-bottom: 0.75rem; }
    .markdown-body p:last-child { margin-bottom: 0; }
    .markdown-body code { background-color: #3f3f46; padding: 0.15rem 0.3rem; border-radius: 0.25rem; font-size: 0.875em; font-family: monospace; }
    .markdown-body pre code { background-color: transparent; padding: 0; font-size: 0.9em; color: #e5e7eb; }
    .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.75rem; }
    .markdown-body ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 0.75rem; }
    /* Hide scrollbar for sidebar to keep it clean */
    #sidebar-chat-list::-webkit-scrollbar { width: 4px; }
    #sidebar-chat-list::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
  </style>
</head>
<body class="bg-[#212121] text-gray-100 font-sans h-screen flex relative overflow-hidden">

  <div id="login-overlay" class="absolute inset-0 bg-[#212121] z-50 flex flex-col items-center justify-center">
    <h2 class="text-2xl font-bold mb-6">Login to AI Assistant</h2>
    <input type="password" id="password-input" placeholder="Enter Password" autocomplete="new-password" class="bg-[#2f2f2f] text-white px-4 py-2 rounded-md mb-4 border border-gray-600 outline-none">
    <button id="login-btn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-6 rounded-md transition-colors">Login</button>
  </div>

  <aside id="sidebar" class="w-64 bg-[#171717] flex-shrink-0 flex-col hidden md:flex absolute md:relative z-40 h-full border-r border-gray-700 transition-transform">
    <div class="p-3 flex justify-between items-center md:block">
        <button id="new-chat-btn" class="flex-1 flex items-center gap-2 bg-[#212121] hover:bg-[#2f2f2f] p-3 rounded-md transition-colors border border-gray-600 w-full">
            <span class="text-xl">+</span> New Chat
        </button>
        <button id="close-sidebar-btn" class="md:hidden ml-2 text-gray-400 hover:text-white p-2">✕</button>
    </div>
    
    <div class="px-3 pb-2 mt-2 text-xs text-gray-500 font-semibold uppercase tracking-wider">Recent Chats (Last 5)</div>
    
    <div id="sidebar-chat-list" class="flex-1 overflow-y-auto px-2 flex flex-col gap-1"></div>
    
    <div class="p-3 border-t border-gray-700 flex flex-col gap-2 bg-[#171717]">
       <button id="clear-chat-btn" class="text-sm text-red-400 hover:text-red-300 text-left p-2 rounded-md hover:bg-[#212121] transition-colors flex items-center gap-2">🗑️ Erase All Data</button>
       <button id="logout-btn" class="text-sm text-gray-400 hover:text-white text-left p-2 rounded-md hover:bg-[#212121] transition-colors flex items-center gap-2">🚪 Logout</button>
    </div>
  </aside>

  <div id="app-container" class="hidden flex-1 flex-col h-full w-full relative bg-[#212121]">
    <header class="flex items-center justify-between p-4 border-b border-gray-700 bg-[#212121] z-10 shrink-0">
      <div class="flex items-center gap-3">
        <button id="mobile-menu-btn" class="md:hidden text-gray-400 hover:text-white">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <h1 class="text-xl font-semibold hidden sm:block">My AI Assistant</h1>
      </div>
      
      <select id="model-select" class="bg-[#2f2f2f] text-sm text-gray-300 border border-gray-600 rounded-md px-3 py-1.5 outline-none cursor-pointer hover:bg-[#3a3a3a] transition-colors"></select>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 w-full max-w-3xl mx-auto pb-32"></main>

    <div class="absolute bottom-0 w-full bg-gradient-to-t from-[#212121] via-[#212121] to-transparent pt-6 pb-6 px-4">
      <form id="chat-form" class="max-w-3xl mx-auto flex items-center bg-[#2f2f2f] rounded-full px-4 py-2 shadow-lg border border-gray-600">
        <input id="chat-input" class="flex-1 bg-transparent border-none outline-none text-white px-2 py-2 placeholder-gray-400" placeholder="Message AI..." autocomplete="off" />
        <button id="submit-btn" type="submit" class="ml-2 bg-white text-black rounded-full p-2 w-10 h-10 flex items-center justify-center font-bold hover:bg-gray-200 transition-colors disabled:opacity-50">↑</button>
      </form>
    </div>
  </div>

  <script>
    // --- UI Elements ---
    const loginOverlay = document.getElementById('login-overlay');
    const appContainer = document.getElementById('app-container');
    const sidebar = document.getElementById('sidebar');
    const passwordInput = document.getElementById('password-input');
    
    const chatBox = document.getElementById('chat-box');
    const form = document.getElementById('chat-form');
    const input = document.getElementById('chat-input');
    const submitBtn = document.getElementById('submit-btn');
    const modelSelect = document.getElementById('model-select');
    const sidebarChatList = document.getElementById('sidebar-chat-list');

    // --- State Management ---
    let chatSessions = [];
    let currentSessionId = null;

    // --- Authentication (1 Day Expiry) ---
    function savePasswordForOneDay(pwd) {
      const oneDayInMs = 24 * 60 * 60 * 1000;
      localStorage.setItem('app_auth_data', JSON.stringify({ password: pwd, expiry: new Date().getTime() + oneDayInMs }));
    }

    function getSavedPassword() {
      const dataStr = localStorage.getItem('app_auth_data');
      if (!dataStr) return '';
      try {
        const data = JSON.parse(dataStr);
        if (new Date().getTime() > data.expiry) {
          localStorage.removeItem('app_auth_data'); 
          return '';
        }
        return data.password;
      } catch(e) { return ''; }
    }

    let savedPassword = getSavedPassword();

    // --- Config & Database Logic ---
    async function loadConfig() {
      try {
        const response = await fetch('/config.json');
        const config = await response.json();
        config.models.forEach(model => {
          const option = document.createElement('option');
          option.value = model.value;
          option.textContent = model.name;
          modelSelect.appendChild(option);
        });
      } catch (error) { console.error("Failed to load config.json"); }
    }
    loadConfig();

    async function saveChatHistory() {
      chatSessions.forEach(session => {
          if(session.messages.length > 50) session.messages = session.messages.slice(-50);
      });
      if (chatSessions.length > 5) chatSessions = chatSessions.slice(-5);

      await fetch('/api/db', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': savedPassword },
        body: JSON.stringify({ history: JSON.stringify(chatSessions) })
      });
    }

    async function loadChatHistory() {
      try {
        const response = await fetch('/api/db', { headers: { 'Authorization': savedPassword } });
        if (response.status === 401) {
          alert("Incorrect Password or Session Expired!");
          localStorage.removeItem('app_auth_data');
          window.location.reload();
          return;
        }
        const data = await response.json();
        
        if (data.history && data.history.length > 0) {
          if (data.history[0].role) {
              chatSessions = [{ id: Date.now().toString(), title: "Previous Chat", messages: data.history }];
          } else {
              chatSessions = data.history;
          }
          currentSessionId = chatSessions[chatSessions.length - 1].id;
        } else {
          startNewSession();
        }
        
        renderSidebar();
        renderActiveChat();
        
      } catch (error) { console.error("Failed to load history."); }
    }

    // --- Core UI Functions ---
    function startNewSession() {
      const newId = Date.now().toString();
      chatSessions.push({ id: newId, title: "New Chat", messages: [] });
      if (chatSessions.length > 5) chatSessions.shift();
      
      currentSessionId = newId;
      renderSidebar();
      renderActiveChat();
      saveChatHistory();
    }

    function switchSession(id) {
      currentSessionId = id;
      renderSidebar();
      renderActiveChat();
      if(window.innerWidth < 768) sidebar.classList.add('hidden');
    }

    // NEW: Function to delete a single session
    async function deleteSession(id, event) {
      event.stopPropagation(); // Prevents the chat from opening when you click the delete button
      
      if(!confirm('Delete this chat?')) return;

      // Filter out the deleted chat
      chatSessions = chatSessions.filter(session => session.id !== id);

      // If we deleted the last chat, start a fresh one
      if (chatSessions.length === 0) {
        startNewSession(); 
      } else {
        // If we deleted the chat we were currently looking at, switch to the newest available one
        if (currentSessionId === id) {
          currentSessionId = chatSessions[chatSessions.length - 1].id;
        }
        renderSidebar();
        renderActiveChat();
        await saveChatHistory();
      }
    }

    function renderSidebar() {
      sidebarChatList.innerHTML = '';
      [...chatSessions].reverse().forEach(session => {
        // Create a wrapper for the chat button and the delete button
        const wrapper = document.createElement('div');
        wrapper.className = 'flex items-center gap-1 mb-1 w-full group';

        const isActive = session.id === currentSessionId;
        
        // The main chat button
        const btn = document.createElement('button');
        btn.className = `flex-1 text-left p-2 rounded-md truncate text-sm transition-colors ${isActive ? 'bg-[#2f2f2f] text-white' : 'text-gray-400 hover:bg-[#212121]'}`;
        btn.textContent = session.title || "New Chat";
        btn.onclick = () => switchSession(session.id);

        // The single delete button (✕)
        const delBtn = document.createElement('button');
        delBtn.className = `p-2 rounded-md text-gray-500 hover:text-red-400 hover:bg-[#212121] transition-colors ${isActive ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'}`;
        delBtn.innerHTML = '✕';
        delBtn.onclick = (e) => deleteSession(session.id, e);

        wrapper.appendChild(btn);
        wrapper.appendChild(delBtn);
        sidebarChatList.appendChild(wrapper);
      });
    }

    function renderActiveChat() {
      chatBox.innerHTML = '';
      const session = chatSessions.find(s => s.id === currentSessionId);
      
      if (!session || session.messages.length === 0) {
        chatBox.innerHTML = '<div id="welcome-msg" class="flex items-center justify-center h-full text-gray-500"><p>How can I help you today?</p></div>';
      } else {
        session.messages.forEach(msg => appendMessageUI(msg.role, msg.content));
      }
    }

    function appendMessageUI(role, text) {
      const welcomeMsg = document.getElementById('welcome-msg');
      if (welcomeMsg) welcomeMsg.remove(); 
      
      const msgDiv = document.createElement('div');
      msgDiv.className = 'mb-6 flex w-full';
      
      const labelDiv = document.createElement('div');
      labelDiv.className = `font-bold mr-4 shrink-0 ${role === 'user' ? 'text-blue-400' : 'text-green-400'}`;
      labelDiv.textContent = role === 'user' ? 'You:' : 'AI:';
      
      const contentDiv = document.createElement('div');
      contentDiv.className = 'flex-1 overflow-x-hidden leading-relaxed markdown-body';
      
      if (role === 'user') {
        contentDiv.textContent = text;
      } else {
        contentDiv.innerHTML = marked.parse(text);
        const preTags = contentDiv.querySelectorAll('pre');
        preTags.forEach(pre => {
          pre.className = 'bg-black text-gray-300 p-4 rounded-md my-4 relative overflow-x-auto group border border-gray-700';
          const copyBtn = document.createElement('button');
          copyBtn.className = 'absolute top-2 right-2 bg-gray-700 hover:bg-gray-600 text-xs text-white px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity';
          copyBtn.textContent = 'Copy';
          copyBtn.addEventListener('click', () => {
            const codeText = pre.querySelector('code')?.innerText || pre.innerText;
            navigator.clipboard.writeText(codeText).then(() => {
              copyBtn.textContent = 'Copied!';
              setTimeout(() => { copyBtn.textContent = 'Copy'; }, 2000);
            });
          });
          pre.appendChild(copyBtn);
        });
      }

      msgDiv.appendChild(labelDiv);
      msgDiv.appendChild(contentDiv);
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // --- Event Listeners ---
    if (savedPassword) {
      loginOverlay.classList.add('hidden');
      appContainer.classList.remove('hidden');
      appContainer.classList.add('flex');
      loadChatHistory();
    }

    document.getElementById('login-btn').addEventListener('click', () => {
      const pwd = passwordInput.value.trim();
      if(pwd) {
        savedPassword = pwd;
        savePasswordForOneDay(pwd);
        loginOverlay.classList.add('hidden');
        appContainer.classList.remove('hidden');
        appContainer.classList.add('flex');
        loadChatHistory();
      }
    });

    document.getElementById('new-chat-btn').addEventListener('click', startNewSession);
    
    document.getElementById('clear-chat-btn').addEventListener('click', async () => {
      if(confirm('Erase ALL 5 chat histories permanently?')) {
        chatSessions = [];
        startNewSession(); 
      }
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('app_auth_data');
      window.location.reload();
    });

    document.getElementById('mobile-menu-btn').addEventListener('click', () => {
      sidebar.classList.remove('hidden');
      sidebar.classList.add('flex');
    });
    document.getElementById('close-sidebar-btn').addEventListener('click', () => {
      sidebar.classList.add('hidden');
      sidebar.classList.remove('flex');
    });

    // --- Message Submission ---
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const userText = input.value.trim();
      if (!userText) return;

      const session = chatSessions.find(s => s.id === currentSessionId);
      
      if (session.messages.length === 0) {
          session.title = userText.substring(0, 20) + (userText.length > 20 ? '...' : '');
          renderSidebar();
      }

      session.messages.push({ role: "user", content: userText });
      appendMessageUI('user', userText);
      saveChatHistory();
      input.value = '';
      input.disabled = true;
      submitBtn.disabled = true;

      const loadingDiv = document.createElement('div');
      loadingDiv.className = "text-gray-500 italic flex animate-pulse mb-6";
      loadingDiv.innerHTML = '<span class="font-bold mr-4 text-green-400">AI:</span> Thinking...';
      chatBox.appendChild(loadingDiv);
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: session.messages, model: modelSelect.value, password: savedPassword })
        });
        
        const data = await response.json();
        loadingDiv.remove();

        if (response.status === 401) {
            alert('Wrong password!');
            localStorage.removeItem('app_auth_data');
            window.location.reload();
            return;
        }

        if (data.reply) {
          session.messages.push({ role: "assistant", content: data.reply });
          appendMessageUI('assistant', data.reply);
          saveChatHistory();
        } else {
          appendMessageUI('assistant', "Error: " + (data.error || "Failed to load."));
        }
      } catch (error) {
        loadingDiv.remove();
        appendMessageUI('assistant', "Server connection error.");
      }

      input.disabled = false;
      submitBtn.disabled = false;
      input.focus();
    });
  </script>
</body>
</html>
